<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WEWON | 위원프로덕션</title>
    <meta name="description" content="WE WANT, WE WON, WE ONE. 위원프로덕션은 감각적인 영상미와 진정성 있는 스토리로 브랜드의 가치를 높입니다.">

    <meta name="naver-site-verification" content="83bd94ea4b6bf5a5df87bd9b66a2f5a112b473d1" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wwwwwo.co.kr/">
    <meta property="og:title" content="WEWON | 위원프로덕션">
    <meta property="og:description" content="WE WANT, WE WON, WE ONE. 감각적인 영상미와 진정성 있는 스토리.">
    <meta property="og:image" content="https://wwwwwo.co.kr/og-image.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chat.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- EmailJS Settings -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        // EmailJS 설정을 한곳에서 관리합니다.
        window._EMAILJS_CONFIG = {
            PUBLIC_KEY: 'YOUR_PUBLIC_KEY',   // 여기에 Public Key 입력
            SERVICE_ID: 'YOUR_SERVICE_ID',   // 여기에 Service ID 입력
            TEMPLATE_ID: 'YOUR_TEMPLATE_ID'  // 여기에 Template ID 입력
        };

        (function () {
            if (window._EMAILJS_CONFIG.PUBLIC_KEY !== 'YOUR_PUBLIC_KEY') {
                emailjs.init(window._EMAILJS_CONFIG.PUBLIC_KEY);
            }
        })();
    </script>
</head>

<body>
    <!-- Header -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">WEWON</a>
            <nav class="brand-nav">
                <div class="nav-item-container">
                    <a href="who.html" class="nav-item">WHO</a>
                </div>
                <div class="nav-item-container">
                    <a href="works.html" class="nav-item">WORKS</a>
                </div>
                <div class="nav-item-container">
                    <a href="with-us.html" class="nav-item">WITH US</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <!-- Home Perspective Section -->
        <section class="home-perspective">
            <div class="perspective-content">
                <h1 class="display-text reveal-text">WE WANT,</h1>
                <h1 class="display-text reveal-text" style="padding-left: 10vw;">WE WON,</h1>
                <h1 class="display-text reveal-text serif">WE ONE.</h1>
            </div>
            <div class="global-bg-layer"></div>
        </section>

        <!-- Featured Section -->
        <section class="featured-preview">
            <div class="section-header">
                <h2 class="section-title reveal-text">FEATURED</h2>
            </div>
            <div class="featured-grid">
                <div class="featured-item reveal-text" data-id="51">
                    <div class="featured-thumb">
                        <img src="https://img.youtube.com/vi/TJlDHFNOnpM/maxresdefault.jpg" alt="Featured Work">
                    </div>
                </div>
                <div class="featured-item reveal-text" data-id="19">
                    <div class="featured-thumb">
                        <img src="images/works/thumb_hq_19.jpg" alt="Featured Work">
                    </div>
                </div>
            </div>
        </section>

        <!-- Shorts Preview Section -->
        <section class="shorts-preview">
            <div class="shorts-preview-content">
                <div class="shorts-text-side">
                    <h2 class="reveal-text">SHORTS<br>EXPERIENCE</h2>
                    <p class="reveal-text">모바일에 최적화된 숏폼 콘텐츠로<br>더욱 강력한 메시지를 전달합니다.</p>
                    <a href="works.html?view=portrait" class="explore-btn reveal-text">SEE MORE</a>
                </div>
                <div class="shorts-display-side">
                    <div class="phone-mockup reveal-text">
                        <div class="phone-screen" id="index-latest-shorts" data-id="61">
                            <img src="https://i.ytimg.com/vi/4DMQj-Fs9sU/oar2.jpg?sqp=-oaymwEoCJUDENAFSFqQAgHyq4qpAxcIARUAAIhC2AEB4gEKCBgQAhgGOAFAAQ==&rs=AOn4CLChWspNrgeZpmdnqBIRmlhrahoiaQ&usqp=CCk"
                                alt="Latest Shorts">
                            <div class="play-overlay"><i class="fas fa-play"></i></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Chat Widget -->
    <div id="chat-widget" class="chat-widget">
        <div class="chat-header">
            <div class="chat-bot-info">
                <div class="chat-bot-avatar">W</div>
                <div class="chat-bot-status">
                    <span class="chat-bot-name">위원 서포트</span>
                    <span class="chat-status-dot online"></span>
                </div>
            </div>
            <button id="chat-close" class="chat-close-btn">&times;</button>
        </div>
        <div id="chat-body" class="chat-body">
            <div class="chat-msg-bubble bot">
                <p>반갑습니다! 위원프로덕션입니다.<br>프로필을 남겨주시면 담당자가 확인 후 연락드리겠습니다.</p>
            </div>

            <div id="chat-lead-container" class="chat-lead-form">
                <form id="chat-form">
                    <div class="chat-input-group">
                        <label for="chat-name">이름 (회사명)</label>
                        <input type="text" id="chat-name" placeholder="홍길동" required>
                    </div>
                    <div class="chat-input-group">
                        <label for="chat-email">이메일</label>
                        <input type="email" id="chat-email" placeholder="example@email.com" required>
                    </div>
                    <div class="chat-input-group">
                        <label for="chat-phone">연락처</label>
                        <input type="tel" id="chat-phone" placeholder="010-0000-0000" required>
                    </div>
                    <div class="chat-input-group">
                        <label for="chat-message">문의 내용</label>
                        <textarea id="chat-message" placeholder="제작하고자 하시는 영상의 성격이나 레퍼런스가 있다면 남겨주세요."
                            required></textarea>
                    </div>
                    <button type="submit" class="chat-submit-btn">문의 보내기</button>
                </form>
            </div>
        </div>
        <div class="chat-footer">
            <input type="text" id="chat-footer-input" placeholder="메시지를 입력하세요 (로그인 후 가능)" disabled>
            <button id="chat-send-btn" class="chat-send-btn" disabled>
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Chat Floating Toggle -->
    <div id="chat-trigger" class="chat-trigger">
        <div class="chat-trigger-icon">
            <svg viewBox="0 0 24 24">
                <path
                    d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z" />
            </svg>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <div class="footer-info">
                <div class="footer-logo">WEWON</div>
                <p>© 2024 WEWON PRODUCTION. ALL RIGHTS RESERVED.</p>
            </div>
            <div class="footer-links">
                <a href="mailto:contact@wwwwwo.co.kr">contact@wwwwwo.co.kr</a>
                <a href="https://www.instagram.com/wwwwwo.official" target="_blank">INSTAGRAM</a>
            </div>
        </div>
    </footer>

    <!-- Video Modal -->
    <div id="video-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div class="video-container">
                <iframe id="modal-iframe" src="" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>
            <div class="modal-info">
                <h3 id="modal-title"></h3>
                <p id="modal-client" class="modal-client"></p>
                <p id="modal-desc" class="modal-desc"></p>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
